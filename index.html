<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dompetku Luxury</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/SKp7kDMk/Dompetku.jpg">
    <style>
        :root { 
            --bg-body: #0f172a;
            --bg-card: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --primary: #38bdf8;
            --income: #4ade80; 
            --expense: #f87171; 
            --edit: #0ea5e9;
            --cash: #fbbf24; 
            --bank: #3b82f6; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; color: var(--text-main); overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 480px; min-height: 100vh; position: relative; padding-bottom: 100px; margin: 0 auto; }

        /* HEADER */
        .luxury-card { 
            background: var(--bg-card); padding: 50px 20px 35px; border-radius: 0 0 40px 40px;
            text-align: center; position: fixed; top: 0; width: 100%; max-width: 480px; z-index: 150; border-bottom: 1px solid var(--glass-border);
        }
        .menu-trigger { position: absolute; top: 25px; left: 25px; font-size: 1.3rem; cursor: pointer; color: var(--text-dim); }
        .hide-trigger { position: absolute; top: 25px; right: 25px; font-size: 1.2rem; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .hide-trigger:active { transform: scale(0.8); color: var(--primary); }

        .saldo-amount { font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; display: block; text-shadow: 0 0 20px rgba(56, 189, 248, 0.3); transition: 0.3s; }
        
        .sub-account-container { display: flex; justify-content: space-around; background: var(--glass); padding: 18px; border-radius: 24px; border: 1px solid var(--glass-border); }

        /* HISTORY AREA */
        .history-section { padding: 0 20px 20px 20px; padding-top: 410px; }
        .sticky-controls { position: fixed; top: 265px; width: 100%; max-width: 480px; background: var(--bg-body); z-index: 140; padding: 20px; left: 50%; transform: translateX(-50%); }
        #searchInput { width: 100%; padding: 15px 20px; border-radius: 18px; border: 1px solid var(--glass-border); background: var(--glass); color: white; outline: none; }

        /* ITEM LIST */
        .item-container { position: relative; overflow: hidden; border-radius: 22px; margin-bottom: 15px; background: var(--glass); border: 1px solid var(--glass-border); }
        .actions-wrapper { position: absolute; top: 0; right: 0; height: 100%; display: flex; width: 140px; z-index: 1; }
        .action-btn { width: 70px; height: 100%; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .item-content { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #1e293b; position: relative; z-index: 2; transition: 0.3s ease; }

        /* FAB */
        .fab-container { position: fixed; bottom: 35px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 99; align-items: center; }
        .fab-main { 
            width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), #818cf8); 
            color: white; border-radius: 22px; border: none; font-size: 28px; 
            box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4); z-index: 2;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .fab-sub { 
            width: 52px; height: 52px; border-radius: 18px; border: none; color: white; 
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transform: scale(0) translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .fab-container.active .fab-sub { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        .fab-container.active .fab-main { transform: rotate(135deg); background: #334155; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 400; backdrop-filter: blur(8px); padding: 20px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 400px; padding: 30px; border-radius: 30px; border: 1px solid var(--glass-border); animation: zoomIn 0.3s ease; }
        .modal-content input, .modal-content select { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid var(--glass-border); border-radius: 15px; background: rgba(0,0,0,0.3); color: white; outline: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-confirm { padding: 15px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #1e293b; z-index: 300; transition: 0.4s; padding: 50px 25px; }
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 250; display: none; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="mainSidebar">
    <div style="text-align: center; margin-bottom: 30px;">
        <img src="https://i.postimg.cc/SKp7kDMk/Dompetku.jpg" style="width:70px; border-radius:50%; border:2px solid var(--primary);">
        <h4 style="color:white; margin: 10px 0 0 0;">Re Febrian</h4>
    </div>
    <div onclick="exportToCSV()" style="color: var(--text-dim); padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;"><i class="fas fa-file-excel"></i> Ekspor ke CSV/Excel</div>
    <div onclick="clearAllData()" style="color: var(--expense); margin-top: auto; padding: 15px 0; font-weight: bold; cursor: pointer;">Hapus Semua Data</div>
</div>

<div class="app-container">
    <div class="luxury-card">
        <div class="menu-trigger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div class="hide-trigger" id="hideBtn" onclick="togglePrivacy()"><i class="fas fa-eye"></i></div>
        
        <p style="font-size:0.6rem; letter-spacing:3px; opacity:0.5; color:var(--primary); margin:0;">TOTAL SALDO</p>
        <span id="saldo-display" class="saldo-amount">Rp 0</span>
        
        <div style="margin-bottom:20px; display:inline-flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); padding:5px 15px; border-radius:20px; border:1px solid var(--glass-border);">
            <span id="label-beku" style="font-size:0.7rem; color:var(--text-dim);">Patokan: Rp 0</span>
            <span id="selisih-live" style="font-size:0.75rem; font-weight:bold;"></span>
            <i class="fas fa-lock" onclick="setPatokan()" style="color:var(--primary); font-size:0.7rem; cursor:pointer;"></i>
        </div>

        <div class="sub-account-container">
            <div class="sub-box" style="text-align: center;"><small style="color: var(--text-dim); display: block; font-size: 0.6rem;">CASH</small><span id="saldo-cash" style="font-weight: bold;">Rp 0</span></div>
            <div class="sub-box" style="text-align: center;"><small style="color: var(--text-dim); display: block; font-size: 0.6rem;">BANK</small><span id="saldo-bank" style="font-weight: bold;">Rp 0</span></div>
        </div>
    </div>

    <div class="history-section">
        <div class="sticky-controls">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem; font-weight:bold; color:var(--text-dim);">
                <span>TRANSAKSI TERAKHIR</span>
                <span onclick="openModal('transfer')" style="color:var(--primary); cursor: pointer;">TRANSFER</span>
            </div>
            <input type="text" id="searchInput" onkeyup="render()" placeholder="Cari nota...">
        </div>
        <div id="list-transaksi"></div>
    </div>

    <div class="fab-container" id="fabContainer">
        <button class="fab-sub" onclick="openModal('masuk')" style="background:var(--income);"><i class="fas fa-plus"></i></button>
        <button class="fab-sub" onclick="openModal('keluar')" style="background:var(--expense);"><i class="fas fa-minus"></i></button>
        <button class="fab-main" onclick="toggleFab()">+</button>
    </div>
</div>

<div id="modalInput" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle" style="text-align:center; color:var(--primary); margin-top:0;">Input Data</h3>
        <input type="date" id="modalDate">
        <input type="text" id="modalDesc" placeholder="Keterangan">
        <input type="text" id="modalAmount" placeholder="Jumlah Rp" inputmode="numeric">
        
        <div id="formStandard">
            <div class="btn-group">
                <button onclick="saveData('cash')" class="btn-confirm" style="background:var(--cash); color:#451a03;">CASH</button>
                <button onclick="saveData('bank')" class="btn-confirm" style="background:var(--bank); color:white;">BANK</button>
            </div>
        </div>

        <div id="formTransfer" style="display:none;">
            <select id="trfFrom"><option value="cash">DARI CASH</option><option value="bank">DARI BANK</option></select>
            <select id="trfTo"><option value="bank">KE BANK</option><option value="cash">KE CASH</option></select>
            <button onclick="doTransfer()" class="btn-confirm" style="background:var(--primary); color:white; width:100%;">TRANSFER SEKARANG</button>
        </div>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:15px; color:var(--text-dim); cursor:pointer;">BATAL</button>
    </div>
</div>

<script>
    let dataKeuangan = JSON.parse(localStorage.getItem('dompet_v3_pwa')) || [];
    let isHidden = localStorage.getItem('dompet_privacy') === 'true';
    let currentType = '', editId = null, startX = 0;
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwjvokS-a9jabj7Jv1_Wf9UR_34ewgDLWoZuWOec1X1hDI_2lu2rBCau-35xWMIJARs/exec'; 

    function toggleSidebar() {
        document.getElementById('mainSidebar').classList.toggle('active');
        document.getElementById('sbOverlay').style.display = document.getElementById('mainSidebar').classList.contains('active') ? 'block' : 'none';
    }

    function togglePrivacy() {
        isHidden = !isHidden;
        localStorage.setItem('dompet_privacy', isHidden);
        render();
    }

    function setPatokan() {
        let sT = dataKeuangan.reduce((a, b) => a + (b.tipe === 'masuk' ? b.nom : -b.nom), 0);
        localStorage.setItem('patokan_saldo_v3', sT);
        render();
    }

    const formatRupiah = (n) => {
        let s = n.toString().replace(/[^,\d]/g, '');
        let split = s.split(','), sisa = split[0].length % 3, r = split[0].substr(0, sisa), ribuan = split[0].substr(sisa).match(/\d{3}/gi);
        if (ribuan) r += (sisa ? '.' : '') + ribuan.join('.');
        return split[1] !== undefined ? r + ',' + split[1] : r;
    };
    const cleanNumber = (s) => parseInt(s.toString().replace(/\./g, '')) || 0;

    document.getElementById('modalAmount').addEventListener('keyup', function() { this.value = formatRupiah(this.value); });

    function toggleFab() { document.getElementById('fabContainer').classList.toggle('active'); }

    function openModal(t, id = null) {
        currentType = t; editId = id;
        document.getElementById('modalInput').style.display = 'flex';
        document.getElementById('modalDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('fabContainer').classList.remove('active');
        
        if(t === 'transfer') {
            document.getElementById('modalTitle').innerText = "Transfer Saldo";
            document.getElementById('formStandard').style.display = 'none';
            document.getElementById('formTransfer').style.display = 'block';
        } else {
            document.getElementById('modalTitle').innerText = t === 'masuk' ? "Pemasukan" : "Pengeluaran";
            document.getElementById('formStandard').style.display = 'block';
            document.getElementById('formTransfer').style.display = 'none';
        }

        if(id) {
            let item = dataKeuangan.find(x => x.id === id);
            document.getElementById('modalDesc').value = item.ket;
            document.getElementById('modalAmount').value = formatRupiah(item.nom);
        }
    }

    function closeModal() { 
        document.getElementById('modalInput').style.display = 'none'; 
        document.getElementById('modalDesc').value = ''; 
        document.getElementById('modalAmount').value = ''; 
        editId = null; 
    }

    function render() {
        const container = document.getElementById('list-transaksi');
        container.innerHTML = '';
        let sT = 0, sC = 0, sB = 0;
        const kw = document.getElementById('searchInput').value.toLowerCase();

        dataKeuangan.forEach(item => {
            let v = item.tipe === 'masuk' ? item.nom : -item.nom;
            sT += v; if(item.akun === 'cash') sC += v; else sB += v;
        });

        const mask = (val) => isHidden ? '••••••••' : `Rp ${val.toLocaleString('id-ID')}`;
        document.getElementById('saldo-display').innerText = mask(sT);
        document.getElementById('saldo-cash').innerText = mask(sC);
        document.getElementById('saldo-bank').innerText = mask(sB);
        document.getElementById('hideBtn').innerHTML = isHidden ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';

        dataKeuangan.filter(i => i.ket.toLowerCase().includes(kw)).sort((a,b) => b.id - a.id).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-container';
            wrapper.innerHTML = `
                <div class="actions-wrapper">
                    <div class="action-btn" style="background:var(--edit)" onclick="openModal('${item.tipe}', ${item.id})">EDIT</div>
                    <div class="action-btn" style="background:var(--expense)" onclick="hapusData(${item.id})">HAPUS</div>
                </div>
                <div class="item-content" ontouchstart="hStart(event)" ontouchmove="hMove(event)" ontouchend="hEnd(event)">
                    <div><span style="font-weight:bold;display:block;">${item.ket}</span><small style="color:var(--text-dim)">${item.tgl} • ${item.akun.toUpperCase()}</small></div>
                    <div style="font-weight:bold; color:${item.tipe==='masuk'?'var(--income)':'var(--expense)'}">${item.tipe==='masuk'?'+':'-'} ${item.nom.toLocaleString('id-ID')}</div>
                </div>`;
            container.appendChild(wrapper);
        });

        const patokan = parseFloat(localStorage.getItem('patokan_saldo_v3')) || 0;
        document.getElementById('label-beku').innerText = `Patokan: ${mask(patokan)}`;
        const selisih = sT - patokan;
        const live = document.getElementById('selisih-live');
        if(patokan !== 0 && !isHidden) {
            live.innerText = `(${(selisih>=0?'+':'')}Rp ${Math.abs(selisih).toLocaleString('id-ID')})`;
            live.style.color = selisih>=0 ? 'var(--income)' : 'var(--expense)';
        } else { live.innerText = ""; }
        localStorage.setItem('dompet_v3_pwa', JSON.stringify(dataKeuangan));
    }

    function saveData(akun) {
        const ket = document.getElementById('modalDesc').value, nom = cleanNumber(document.getElementById('modalAmount').value);
        if(!ket || nom <= 0) return alert("Isi data!");
        const p = document.getElementById('modalDate').value.split('-');
        const item = { id: editId || Date.now(), ket: ket, nom: nom, tipe: currentType, akun: akun, tgl: `${p[2]}/${p[1]}/${p[0]}` };
        if(!editId) dataKeuangan.push(item); else dataKeuangan[dataKeuangan.findIndex(x => x.id === editId)] = item;
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
        closeModal(); render();
    }

    function doTransfer() {
        const d = document.getElementById('trfFrom').value, k = document.getElementById('trfTo').value, n = cleanNumber(document.getElementById('modalAmount').value);
        const ketIn = document.getElementById('modalDesc').value || "Transfer Saldo";
        if (d === k || n <= 0) return alert("Akun harus berbeda & nominal harus isi!");
        const p = document.getElementById('modalDate').value.split('-');
        const tgl = `${p[2]}/${p[1]}/${p[0]}`;
        const itemOut = { id: Date.now(), ket: `[TRF] ${ketIn} (Ke ${k.toUpperCase()})`, nom: n, tipe: 'keluar', akun: d, tgl };
        const itemIn = { id: Date.now()+1, ket: `[TRF] ${ketIn} (Dr ${d.toUpperCase()})`, nom: n, tipe: 'masuk', akun: k, tgl };
        dataKeuangan.push(itemOut, itemIn);
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(itemOut) });
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(itemIn) });
        closeModal(); render();
    }

    function hapusData(id) { 
        if(confirm("Hapus?")) { 
            let item = dataKeuangan.find(x => x.id === id);
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({...item, action:'DELETE'}) });
            dataKeuangan = dataKeuangan.filter(x => x.id !== id); 
            render(); 
        } 
    }

    function exportToCSV() {
        let csvContent = "data:text/csv;charset=utf-8,Tanggal,Keterangan,Tipe,Akun,Nominal\n";
        dataKeuangan.forEach(row => {
            csvContent += `${row.tgl},${row.ket},${row.tipe},${row.akun},${row.nom}\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Laporan_Dompetku.csv");
        document.body.appendChild(link);
        link.click();
    }

    function clearAllData() { if(confirm("Hapus semua data permanen?")) { localStorage.clear(); location.reload(); } }
    function hStart(e) { startX = e.touches[0].clientX; }
    function hMove(e) { let d = startX - e.touches[0].clientX; if(d>0 && d<150) e.currentTarget.style.transform = `translateX(-${d}px)`; }
    function hEnd(e) { let d = startX - e.changedTouches[0].clientX; e.currentTarget.style.transform = d > 70 ? `translateX(-140px)` : `translateX(0)`; }
    render();

    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => {
      console.log('Service Worker Registered');
    });
  }
</script>
</body>
</html>
